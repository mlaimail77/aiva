server:
    host: "0.0.0.0"
    http_port: 8080
    grpc_port: 50051
    cors_origins: ["*"]
livekit:
    url: "${LIVEKIT_URL}"
    api_key: "${LIVEKIT_API_KEY}"
    api_secret: "${LIVEKIT_API_SECRET}"
warmup:
    enabled: true
    distributed:
        enabled: true
        timeout_s: 30
inference:
    avatar:
        default: "flash_head"
        runtime:
            cuda_visible_devices: "0"
            world_size: 1
        flash_head:
            plugin_class: "inference.plugins.avatar.flash_head_plugin.FlashHeadAvatarPlugin"
            models_dir: "./models/flash_head"
            checkpoint_dir: "./checkpoints/SoulX-FlashHead-1_3B"
            wav2vec_dir: "./checkpoints/wav2vec2-base-960h"
            model_type: "lite"
            compile_model: false
            compile_vae: false
            device: "cuda:0"
            seed: 9999
        live_act:
            plugin_class: "inference.plugins.avatar.live_act_plugin.LiveActAvatarPlugin"
            models_dir: "./checkpoints/SoulX-LiveAct"
            ckpt_dir: "./checkpoints/LiveAct"
            wav2vec_dir: "./checkpoints/japanese-wav2vec2-base"
            size: "320*480"
            fps: 20
            seed: 42
            audio_cfg: 1.0
            t5_cpu: false
            fp8_kv_cache: false
            offload_cache: false
            block_offload: false
            mean_memory: false
            compile_wan_model: false
            compile_vae_decode: false
            default_prompt: "一个人在说话"
    llm:
        default: "openrouter"
        openrouter:
            plugin_class: "inference.plugins.llm.openai_plugin.OpenRouterLLMPlugin"
            api_key: "${OPENAI_API_KEY}"
            base_url: "https://openrouter.ai/api/v1"
            model: "${OPENAI_MODEL}"
            temperature: 0.7
            system_prompt: "你是一个友善的数字人助手。"
        vision:
            plugin_class: "inference.plugins.llm.openai_plugin.OpenRouterLLMPlugin"
            api_key: "${VISION_LLM_API_KEY}"
            base_url: "https://openrouter.ai/api/v1"
            model: "${VISION_LLM_MODEL}"
            temperature: 0.7
            system_prompt: "描述图片中的内容。"
    tts:
        default: "cartesia"
        cartesia:
            plugin_class: "inference.plugins.tts.cartesia_tts_plugin.CartesiaTTSPlugin"
            api_key: "${CARTESIA_API_KEY}"
            voice_id: "${CARTESIA_VOICE_ID}"
            ws_url: "wss://api.cartesia.ai/tts/websocket"
            model_id: "sonic-3"
    asr:
        default: "whisper"
        whisper:
            plugin_class: "inference.plugins.asr.whisper_plugin.WhisperASRPlugin"
            model_size: "base"
            language: "auto"
            device: "cpu"
session:
    max_concurrent: 4
    idle_timeout_s: 300
    max_duration_s: 3600
pipeline:
    default_mode: "standard"
    streaming_mode: "direct"
    turn_enabled: true
    turn_port: 8443
    turn_realm: "aiva"
    turn_username: "aiva"
    turn_password: "${TURN_PASSWORD}"
    ice_public_ip: "${ICE_PUBLIC_IP}"
recording:
    enabled: true
    output_dir: "./recordings"
    crf: 23
inference_grpc:
    addr: "localhost:50051"